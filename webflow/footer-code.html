<!-- ============================================================================
     Updating to a new version

     The @1.2.0 in both URLs (here and in the head block) is a pinned release
     tag. jsDelivr caches it permanently, so the live site cannot change on its
     own — a deploy is always a deliberate act on your side.

     Note the missing "v": the git tag is v1.2.0, but jsDelivr strips the
     leading v from semver tags. Using @v1.2.0 in the URL returns a 404.
     A freshly pushed tag takes a few minutes to appear on the CDN.

     To ship a change: a new tag gets pushed to GitHub, then you update the
     version number in BOTH the head block and this one. They must match.

     Tags are listed at:
     https://github.com/JohnKuehnDesign/nsbh-webflow/releases
